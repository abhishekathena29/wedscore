<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="WedPlan — Plan your perfect wedding day, together. Manage tasks, budget, vendors, and more.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-signin-client_id"
    content="602698384232-ljee3aof4u3d165mk0qg0ser39mf06o5.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="WedPlan">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>WedPlan</title>
  <link rel="manifest" href="manifest.json">

  <!-- Google Font to match app theme -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">

  <style>
    /* ─── Reset & Base ──────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #FDF8F3;
    }

    /* ─── Landing Page Container ────────────────────── */
    #landing {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #FDF8F3 0%, #F5E6D3 35%, #E8B89D 70%, #D4A574 100%);
      transition: opacity 0.8s cubic-bezier(.4, 0, .2, 1), transform 0.8s cubic-bezier(.4, 0, .2, 1);
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    }

    #landing.fade-out {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    /* ─── Floating Petals / Particles ───────────────── */
    .petal {
      position: absolute;
      border-radius: 50% 0 50% 0;
      opacity: 0;
      pointer-events: none;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) rotate(0deg) scale(0.5);
        opacity: 0;
      }

      10% {
        opacity: 0.7;
      }

      90% {
        opacity: 0.3;
      }

      100% {
        transform: translateY(-110vh) rotate(360deg) scale(1);
        opacity: 0;
      }
    }

    /* ─── Logo Container ───────────────────────────── */
    .logo-container {
      position: relative;
      margin-bottom: 2.5rem;
    }

    .logo-glow {
      position: absolute;
      inset: -20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212, 165, 116, 0.35) 0%, transparent 70%);
      animation: pulseGlow 3s ease-in-out infinite;
    }

    @keyframes pulseGlow {

      0%,
      100% {
        transform: scale(1);
        opacity: 0.6;
      }

      50% {
        transform: scale(1.25);
        opacity: 1;
      }
    }

    .logo-circle {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: floatLogo 4s ease-in-out infinite;
    }

    @keyframes floatLogo {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .logo-circle svg {
      width: 52px;
      height: 52px;
      fill: white;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.15));
    }

    /* ─── Sparkle ring around logo ──────────────────── */
    .sparkle-ring {
      position: absolute;
      inset: -30px;
      border-radius: 50%;
      border: 1.5px dashed rgba(212, 165, 116, 0.3);
      animation: spinSlow 20s linear infinite;
    }

    .sparkle-ring::before,
    .sparkle-ring::after {
      content: '✦';
      position: absolute;
      font-size: 12px;
      color: rgba(212, 175, 55, 0.6);
    }

    .sparkle-ring::before {
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
    }

    .sparkle-ring::after {
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
    }

    @keyframes spinSlow {
      to {
        transform: rotate(360deg);
      }
    }

    /* ─── Branding Text ────────────────────────────── */
    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 700;
      color: #2C2420;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      animation: fadeSlideUp 1s 0.3s ease-out both;
    }

    .tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      color: #6B5B4E;
      letter-spacing: 0.02em;
      max-width: 320px;
      text-align: center;
      line-height: 1.6;
      animation: fadeSlideUp 1s 0.5s ease-out both;
    }

    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ─── Feature Pills ────────────────────────────── */
    .features {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 2.5rem;
      animation: fadeSlideUp 1s 0.7s ease-out both;
    }

    .pill {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.55rem 1rem;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(212, 165, 116, 0.2);
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: 600;
      color: #6B5B4E;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      transition: transform 0.25s, box-shadow 0.25s;
    }

    .pill:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(212, 165, 116, 0.15);
    }

    .pill-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #D4A574, #E8B89D);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: white;
    }

    /* ─── Loading Indicator ─────────────────────────── */
    .loader-section {
      position: absolute;
      bottom: 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      animation: fadeSlideUp 1s 1s ease-out both;
    }

    .loader-dots {
      display: flex;
      gap: 6px;
    }

    .loader-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #D4A574;
      animation: dotPulse 1.4s ease-in-out infinite;
    }

    .loader-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .loader-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes dotPulse {

      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.4;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    .loader-text {
      font-size: 0.78rem;
      color: #9B8B7E;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ─── Decorative rings ─────────────────────────── */
    .deco-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(212, 165, 116, 0.12);
      pointer-events: none;
    }

    .deco-ring-1 {
      width: 300px;
      height: 300px;
      top: -80px;
      right: -80px;
      animation: ringFloat 8s ease-in-out infinite;
    }

    .deco-ring-2 {
      width: 200px;
      height: 200px;
      bottom: -60px;
      left: -60px;
      animation: ringFloat 6s ease-in-out infinite reverse;
    }

    .deco-ring-3 {
      width: 160px;
      height: 160px;
      top: 20%;
      left: 10%;
      border-color: rgba(232, 184, 157, 0.1);
      animation: ringFloat 10s ease-in-out infinite 2s;
    }

    @keyframes ringFloat {

      0%,
      100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(15px, -15px);
      }
    }

    /* ─── Bottom gradient bar ──────────────────────── */
    .bottom-accent {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #D4A574, #E8B89D, #D4AF37, #E8B89D, #D4A574);
      background-size: 200% 100%;
      animation: shiftGradient 4s ease-in-out infinite;
    }

    @keyframes shiftGradient {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    /* ─── Responsive tweaks ────────────────────────── */
    @media (max-width: 480px) {
      .logo-circle {
        width: 96px;
        height: 96px;
      }

      .logo-circle svg {
        width: 42px;
        height: 42px;
      }

      .features {
        gap: 0.5rem;
        padding: 0 1rem;
      }

      .deco-ring-1 {
        width: 180px;
        height: 180px;
      }

      .deco-ring-3 {
        display: none;
      }
    }
  </style>
</head>

<body>
  <!-- ─── Landing Page ──────────────────────────────── -->
  <div id="landing">
    <!-- Decorative rings -->
    <div class="deco-ring deco-ring-1"></div>
    <div class="deco-ring deco-ring-2"></div>
    <div class="deco-ring deco-ring-3"></div>

    <!-- Animated logo -->
    <div class="logo-container">
      <div class="logo-circle">
        <img src="favicon.png" alt="WedPlan Logo" style="width: 100px; height: 100px; object-fit: contain;">
      </div>
    </div>

    <!-- Branding -->
    <h1 class="brand-name">WedPlan</h1>
    <p class="tagline">Plan your perfect day, together</p>

    <!-- Feature pills -->
    <div class="features">
      <div class="pill">
        <span class="pill-icon">✓</span>
        <span>Tasks</span>
      </div>
      <div class="pill">
        <span class="pill-icon">₹</span>
        <span>Budget</span>
      </div>
      <div class="pill">
        <span class="pill-icon">★</span>
        <span>Vendors</span>
      </div>
      <div class="pill">
        <span class="pill-icon">♡</span>
        <span>Gallery</span>
      </div>
    </div>

    <!-- Loading indicator -->
    <div class="loader-section">
      <div class="loader-dots">
        <span></span><span></span><span></span>
      </div>
      <span class="loader-text">Loading your planner</span>
    </div>

    <!-- Bottom accent bar -->
    <div class="bottom-accent"></div>
  </div>

  <!-- ─── Floating Petal Generator ─────────────────── -->
  <script>
    (function createPetals() {
      const landing = document.getElementById('landing');
      const colors = [
        'rgba(212,165,116,0.35)',
        'rgba(232,184,157,0.30)',
        'rgba(245,230,211,0.40)',
        'rgba(212,175,55,0.20)',
        'rgba(255,255,255,0.25)',
      ];
      for (let i = 0; i < 18; i++) {
        const petal = document.createElement('div');
        petal.className = 'petal';
        const size = Math.random() * 14 + 6;
        const left = Math.random() * 100;
        const dur = Math.random() * 10 + 8;
        const delay = Math.random() * 8;
        const color = colors[Math.floor(Math.random() * colors.length)];
        petal.style.cssText = `
          width:${size}px; height:${size}px;
          left:${left}%; bottom:-20px;
          background:${color};
          animation-duration:${dur}s;
          animation-delay:${delay}s;
        `;
        landing.appendChild(petal);
      }
    })();
  </script>

  <!-- ─── Flutter Bootstrap ────────────────────────── -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- ─── Fade out landing when Flutter is ready ───── -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const landing = document.getElementById('landing');
      if (landing) {
        landing.classList.add('fade-out');
        setTimeout(function () { landing.remove(); }, 900);
      }
    });
  </script>
</body>

</html>
